name: keepi
description: Asistente Inteligente de Organización y Gestión Documental

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  provider: ^6.1.1
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1
  flutter_appauth: ^11.0.0
  app_links: ^7.0.0
  path_provider: ^2.1.2
  file_picker: ^8.0.0+1
  http: ^1.6.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  syncfusion_flutter_pdfviewer: ^33.1.49

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
